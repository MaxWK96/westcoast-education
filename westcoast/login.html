<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logga in - WestCoast Education</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav>
    <a href="index.html" class="logo">🎓 WestCoast Education</a>
    <ul>
      <li><a href="index.html">Kurser</a></li>
    </ul>
    <div id="nav-user-info"></div>
  </nav>

  <main>

    <!-- Inloggning och registrering -->
    <div class="login-container">
      <h2>Logga in</h2>

      <div class="form-group">
        <label for="username">Användarnamn</label>
        <input type="text" id="username" placeholder="Ditt användarnamn" />
      </div>
      <div class="form-group">
        <label for="password">Lösenord</label>
        <input type="password" id="password" placeholder="Ditt lösenord" />
      </div>
      <button class="btn btn-primary btn-full" id="login-btn">Logga in</button>
      <div class="error-msg" id="login-error"></div>

      <hr />

      <h2 class="subtitle">Skapa konto</h2>

      <div class="form-group">
        <label for="reg-username">Välj användarnamn</label>
        <input type="text" id="reg-username" placeholder="Användarnamn" />
      </div>
      <div class="form-group">
        <label for="reg-password">Välj lösenord</label>
        <input type="password" id="reg-password" placeholder="Lösenord" />
      </div>
      <button class="btn btn-secondary btn-full" id="register-btn">Registrera</button>
      <div class="error-msg" id="reg-error"></div>
      <div class="success-msg" id="reg-success">✅ Konto skapat! Du loggas in...</div>
    </div>

  </main>

  <script type="module" src="js/login.js"></script>
</body>
</html>
